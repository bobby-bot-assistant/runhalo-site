<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Halo</title>
  <meta name="description" content="Sign in to Halo to view full scan results and manage your compliance dashboard.">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'Fira Code', 'Consolas', 'monospace'],
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          colors: {
            halo: {
              bg: 'var(--halo-bg)',
              surface: 'var(--halo-surface)',
              border: 'var(--halo-border)',
              accent: 'var(--halo-accent)',
              'accent-light': 'var(--halo-accent-light)',
              green: 'var(--halo-green)',
              'green-dim': 'var(--halo-green-dim)',
              red: 'var(--halo-red)',
              'red-dim': 'var(--halo-red-dim)',
              yellow: 'var(--halo-yellow)',
              'yellow-dim': 'var(--halo-yellow-dim)',
              muted: 'var(--halo-muted)',
              subtle: 'var(--halo-subtle)',
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.6s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --halo-bg: #ffffff;
      --halo-surface: #f9fafb;
      --halo-border: #e5e7eb;
      --halo-accent: #4f46e5;
      --halo-accent-light: #6366f1;
      --halo-text: #111827;
      --halo-text-secondary: #4b5563;
      --halo-muted: #6b7280;
      --halo-subtle: #9ca3af;
      --halo-green: #16a34a;
      --halo-green-dim: #dcfce7;
      --halo-red: #dc2626;
      --halo-red-dim: #fef2f2;
      --halo-yellow: #ca8a04;
      --halo-yellow-dim: #fefce8;
    }
    [data-theme="dark"] {
      --halo-bg: #0a0a0f;
      --halo-surface: #12121a;
      --halo-border: #1e1e2e;
      --halo-accent: #6366f1;
      --halo-accent-light: #818cf8;
      --halo-text: #f9fafb;
      --halo-text-secondary: #d1d5db;
      --halo-muted: #6b7280;
      --halo-subtle: #374151;
      --halo-green: #22c55e;
      --halo-green-dim: #166534;
      --halo-red: #ef4444;
      --halo-red-dim: #7f1d1d;
      --halo-yellow: #eab308;
      --halo-yellow-dim: #713f12;
    }
    body { background: var(--halo-bg); color: var(--halo-text); }
  </style>
  <script>
    const savedTheme = localStorage.getItem('halo-theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
</head>
<body class="font-sans min-h-screen flex flex-col" style="color: var(--halo-text);">

  <!-- Nav -->
  <nav class="border-b border-halo-border bg-halo-bg/80 backdrop-blur-sm">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/app/" class="flex items-center gap-2 hover:text-halo-accent-light transition-colors" style="color: var(--halo-text);">
        <svg class="w-7 h-7 text-halo-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" stroke-dasharray="4 2" />
          <circle cx="12" cy="12" r="4" fill="currentColor" />
        </svg>
        <span class="font-bold text-lg">Halo</span>
      </a>
      <div class="flex items-center gap-4">
        <a href="/app/" class="text-halo-muted hover:text-halo-accent text-sm transition-colors">Back to Scanner</a>
        <button onclick="toggleTheme()" id="theme-toggle" class="text-halo-muted hover:text-halo-accent transition-colors" aria-label="Toggle theme">
          <svg id="sun-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg id="moon-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-sm animate-fade-in">

      <!-- Tab Toggle -->
      <div class="flex bg-halo-surface border border-halo-border rounded-lg p-1 mb-8">
        <button id="tab-signup" onclick="switchTab('signup')" class="flex-1 py-2 text-sm font-medium rounded-md transition-all bg-halo-accent text-white">
          Sign Up
        </button>
        <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-2 text-sm font-medium rounded-md transition-all text-halo-muted hover:text-halo-accent">
          Log In
        </button>
      </div>

      <!-- Signup Form -->
      <form id="signup-form" onsubmit="handleSignup(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-halo-muted mb-1.5">Email</label>
          <input
            type="email"
            id="signup-email"
            required
            placeholder="you@company.com"
            class="w-full bg-halo-surface border border-halo-border rounded-lg px-4 py-3 placeholder-halo-subtle outline-none focus:border-halo-accent transition-colors"
          >
        </div>
        <div>
          <label class="block text-sm font-medium text-halo-muted mb-1.5">Password</label>
          <input
            type="password"
            id="signup-password"
            required
            minlength="6"
            placeholder="Min 6 characters"
            class="w-full bg-halo-surface border border-halo-border rounded-lg px-4 py-3 placeholder-halo-subtle outline-none focus:border-halo-accent transition-colors"
          >
        </div>
        <button type="submit" id="signup-btn" class="w-full bg-halo-accent hover:bg-halo-accent-light text-white font-semibold py-3 rounded-lg transition-all">
          Create Account
        </button>

        <!-- Magic link -->
        <div class="text-center">
          <button type="button" onclick="sendMagicLink('signup')" class="text-halo-muted text-xs hover:text-halo-accent-light transition-colors underline underline-offset-2">
            Or sign up with a magic link
          </button>
        </div>
      </form>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)" class="hidden space-y-4">
        <div>
          <label class="block text-sm font-medium text-halo-muted mb-1.5">Email</label>
          <input
            type="email"
            id="login-email"
            required
            placeholder="you@company.com"
            class="w-full bg-halo-surface border border-halo-border rounded-lg px-4 py-3 placeholder-halo-subtle outline-none focus:border-halo-accent transition-colors"
          >
        </div>
        <div>
          <label class="block text-sm font-medium text-halo-muted mb-1.5">Password</label>
          <input
            type="password"
            id="login-password"
            required
            placeholder="Your password"
            class="w-full bg-halo-surface border border-halo-border rounded-lg px-4 py-3 placeholder-halo-subtle outline-none focus:border-halo-accent transition-colors"
          >
        </div>
        <button type="submit" id="login-btn" class="w-full bg-halo-accent hover:bg-halo-accent-light text-white font-semibold py-3 rounded-lg transition-all">
          Log In
        </button>

        <!-- Magic link -->
        <div class="text-center">
          <button type="button" onclick="sendMagicLink('login')" class="text-halo-muted text-xs hover:text-halo-accent-light transition-colors underline underline-offset-2">
            Or log in with a magic link
          </button>
        </div>
      </form>

      <!-- License Key Form -->
      <form id="license-form" onsubmit="handleLicense(event)" class="hidden space-y-4">
        <div>
          <label class="block text-sm font-medium text-halo-muted mb-1.5">License Key</label>
          <input
            type="text"
            id="license-key"
            required
            placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
            class="w-full bg-halo-surface border border-halo-border rounded-lg px-4 py-3 placeholder-halo-subtle outline-none focus:border-halo-accent transition-colors font-mono text-sm"
          >
        </div>
        <button type="submit" id="license-btn" class="w-full bg-halo-accent hover:bg-halo-accent-light text-white font-semibold py-3 rounded-lg transition-all">
          Activate License
        </button>
        <p class="text-halo-subtle text-xs text-center">
          <button type="button" onclick="switchTab('signup')" class="text-halo-accent hover:text-halo-accent-light underline underline-offset-2">Back to Sign Up</button>
        </p>
      </form>

      <!-- Status Messages -->
      <div id="status-message" class="hidden mt-4 p-3 rounded-lg text-sm text-center"></div>

      <!-- Pro upgrade CTA -->
      <div class="mt-8 p-4 bg-halo-surface border border-halo-border rounded-lg text-center">
        <p class="text-xs text-halo-muted mb-1">Need unlimited scans + AI analysis?</p>
        <a href="/#pricing" class="text-halo-accent hover:text-halo-accent-light text-xs font-medium underline underline-offset-2">Plans from $29/mo →</a>
      </div>

    </div>
  </main>

  <footer class="border-t border-halo-border py-6">
    <div class="max-w-5xl mx-auto px-6 text-center text-halo-muted text-xs">
      &copy; 2026 Mindful Media. All rights reserved.
    </div>
  </footer>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <script>
    // ==================== Theme Toggle ====================
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      localStorage.setItem('halo-theme', isDark ? 'light' : 'dark');
      updateThemeIcons();
    }
    function updateThemeIcons() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.getElementById('sun-icon')?.classList.toggle('hidden', !isDark);
      document.getElementById('moon-icon')?.classList.toggle('hidden', isDark);
    }
    updateThemeIcons();

    // ==================== Config ====================
    const SUPABASE_URL = 'https://wrfwcmyxxbafcdvxlmug.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndyZndjbXl4eGJhZmNkdnhsbXVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDc5MzIsImV4cCI6MjA4NzkyMzkzMn0.6Wj58QDuojPAY_ArVbZvjhcFVuX5VvzqjaEg0FkoYJI';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ==================== Tab Switching ====================
    function switchTab(tab) {
      const forms = { signup: 'signup-form', login: 'login-form', license: 'license-form' };
      const tabs = { signup: 'tab-signup', login: 'tab-login' };

      // Hide all forms
      Object.values(forms).forEach(id => document.getElementById(id).classList.add('hidden'));

      // Show selected form
      document.getElementById(forms[tab])?.classList.remove('hidden');

      // Update tab styles
      Object.entries(tabs).forEach(([key, id]) => {
        const el = document.getElementById(id);
        if (key === tab) {
          el.className = 'flex-1 py-2 text-sm font-medium rounded-md transition-all bg-halo-accent text-white';
        } else {
          el.className = 'flex-1 py-2 text-sm font-medium rounded-md transition-all text-halo-muted hover:text-halo-accent';
        }
      });

      hideStatus();
    }

    // ==================== Auth Handlers ====================
    async function handleSignup(e) {
      e.preventDefault();
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const btn = document.getElementById('signup-btn');

      btn.textContent = 'Creating account...';
      btn.disabled = true;

      try {
        const { data, error } = await supabaseClient.auth.signUp({
          email,
          password,
          options: {
            emailRedirectTo: `${window.location.origin}/app/dashboard.html`,
          }
        });

        if (error) throw error;

        // Link anonymous scans
        await linkScans(data.user?.id);

        showStatus('Account created! Check your email to confirm, then you can log in.', 'success');

        // If auto-confirmed (dev mode), redirect immediately
        if (data.session) {
          redirectAfterAuth();
        }
      } catch (err) {
        showStatus(err.message || 'Signup failed. Please try again.', 'error');
      } finally {
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');

      btn.textContent = 'Logging in...';
      btn.disabled = true;

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password,
        });

        if (error) throw error;

        // Link anonymous scans
        await linkScans(data.user?.id);

        redirectAfterAuth();
      } catch (err) {
        showStatus(err.message || 'Login failed. Please check your credentials.', 'error');
      } finally {
        btn.textContent = 'Log In';
        btn.disabled = false;
      }
    }

    async function sendMagicLink(context) {
      const emailId = context === 'signup' ? 'signup-email' : 'login-email';
      const email = document.getElementById(emailId).value;

      if (!email) {
        showStatus('Please enter your email address first.', 'error');
        return;
      }

      try {
        const { error } = await supabaseClient.auth.signInWithOtp({
          email,
          options: {
            emailRedirectTo: `${window.location.origin}/app/dashboard.html`,
          }
        });

        if (error) throw error;
        showStatus('Magic link sent! Check your email.', 'success');
      } catch (err) {
        showStatus(err.message || 'Failed to send magic link.', 'error');
      }
    }

    async function handleLicense(e) {
      e.preventDefault();
      const key = document.getElementById('license-key').value.trim();
      const btn = document.getElementById('license-btn');

      btn.textContent = 'Validating...';
      btn.disabled = true;

      try {
        // Validate license via existing edge function
        const res = await fetch(`${SUPABASE_URL}/functions/v1/validate-license`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          },
          body: JSON.stringify({ license_key: key }),
        });

        const data = await res.json();

        if (!res.ok || !data.valid) {
          throw new Error(data.error || 'Invalid or expired license key.');
        }

        // Store license in localStorage for dashboard access
        localStorage.setItem('halo_license', JSON.stringify({
          key,
          email: data.email,
          tier: data.tier,
          status: data.status,
        }));

        showStatus(`License activated! Tier: ${data.tier}`, 'success');

        // Try to sign in or create account with the license email
        setTimeout(() => {
          showStatus('Please sign up or log in with this email to access the dashboard.', 'info');
          switchTab('signup');
          document.getElementById('signup-email').value = data.email || '';
        }, 1500);

      } catch (err) {
        showStatus(err.message || 'License validation failed.', 'error');
      } finally {
        btn.textContent = 'Activate License';
        btn.disabled = false;
      }
    }

    // ==================== Helpers ====================
    async function linkScans(userId) {
      if (!userId) return;
      const sessionToken = getCookie('halo_session');
      if (!sessionToken) return;

      try {
        await supabaseClient.rpc('link_anonymous_scans', {
          p_session_token: sessionToken,
          p_user_id: userId,
        });
      } catch (err) {
        console.warn('Failed to link anonymous scans:', err);
      }
    }

    function redirectAfterAuth() {
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect');
      const scanId = params.get('scan_id');

      if (redirect === 'results' && scanId) {
        window.location.href = `/app/results.html?id=${scanId}`;
      } else {
        window.location.href = '/app/dashboard.html';
      }
    }

    function getCookie(name) {
      const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? match[2] : null;
    }

    function showStatus(message, type) {
      const el = document.getElementById('status-message');
      el.classList.remove('hidden');
      el.textContent = message;
      el.className = `mt-4 p-3 rounded-lg text-sm text-center ${
        type === 'success' ? 'bg-halo-green-dim/30 border border-halo-green/30 text-halo-green' :
        type === 'error' ? 'bg-halo-red-dim/30 border border-halo-red/30 text-halo-red' :
        'bg-halo-accent/10 border border-halo-accent/30 text-halo-accent-light'
      }`;
    }

    function hideStatus() {
      document.getElementById('status-message').classList.add('hidden');
    }

    // ==================== Init ====================
    // Check URL params for initial tab
    const params = new URLSearchParams(window.location.search);
    if (params.get('tab') === 'login') switchTab('login');
    else if (params.get('tab') === 'license') switchTab('license');

    // If already authenticated, redirect
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        redirectAfterAuth();
      }
    });

    // Handle auth state changes (magic link redirect)
    supabaseClient.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        await linkScans(session.user?.id);
        // Sprint 25: Fetch and store license key for feedback UI
        try {
          const email = session.user?.email;
          if (email) {
            const { data: license } = await supabaseClient
              .from('halo_licenses')
              .select('license_key')
              .eq('email', email)
              .eq('status', 'active')
              .limit(1)
              .single();
            if (license?.license_key) {
              localStorage.setItem('halo_license_key', license.license_key);
            }
          }
        } catch (e) { /* non-fatal */ }
        redirectAfterAuth();
      }
    });
  </script>

</body>
</html>
